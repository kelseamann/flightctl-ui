# GitLab Pages: static build of the standalone Flight Control / RHEM UI.
# Site URL (after deploy): https://<namespace>.gitlab.io/<project>/
# Example: https://kmann4.gitlab.io/rhem-current-state/

stages:
  - build
  - deploy

variables:
  NODE_VERSION: "22"
  # Webpack publicPath for project Pages (subpath, not user/group root site).
  ASSET_PATH: "/${CI_PROJECT_NAME}/"
  IS_RHEM: "true"
  NODE_OPTIONS: "--max-old-space-size=4096"

default:
  image: node:${NODE_VERSION}-bookworm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - apps/standalone/node_modules/
      - libs/types/node_modules/
      - libs/ui-components/node_modules/
      - libs/i18n/node_modules/

build:ui:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - npm ci
    - npm run build:libs
    - ASSET_PATH="${ASSET_PATH}" IS_RHEM="${IS_RHEM}" npm run build
  artifacts:
    expire_in: 1 week
    paths:
      - apps/standalone/dist/

pages:
  stage: deploy
  needs:
    - job: build:ui
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - sh hack/gitlab-pages-prepare.sh
  artifacts:
    paths:
      - public
  pages:
    publish: public
